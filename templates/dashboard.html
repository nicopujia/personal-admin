{% extends "base.html" %}

{% set breadcrumb_items = [
  {"label": "Dashboard", "current": true}
] %}

{% block title %}Dashboard - {{ admin_title }}{% endblock %}

{% block content %}
  <section class="feature-list" aria-label="Admin features">
    <a class="feature-row" href="{{ url_for('redirects_page') }}">
      <span>
        <strong>Redirects</strong>
        <small>{{ enabled_count }} active, {{ path_count }} paths</small>
      </span>
      <span class="feature-arrow">Open</span>
    </a>
  </section>
{% endblock %}
