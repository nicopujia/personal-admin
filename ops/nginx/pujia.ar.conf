server {
    listen       80;
    server_name  pujia.ar www.pujia.ar;

    root /var/www/pujia.ar;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @pujia_redirect;
    }

    location @pujia_redirect {
        proxy_pass         http://127.0.0.1:8043;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Pujia-Redirect-Request 1;
        proxy_read_timeout 30s;
    }
}

server {
    listen       443 ssl;
    server_name  pujia.ar;

    ssl_certificate      /etc/letsencrypt/live/pujia.ar/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/pujia.ar/privkey.pem;

    root /var/www/pujia.ar;
    index index.html;

    location / {
        try_files $uri $uri/ @pujia_redirect;
    }

    location @pujia_redirect {
        proxy_pass         http://127.0.0.1:8043;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Pujia-Redirect-Request 1;
        proxy_read_timeout 30s;
    }
}
